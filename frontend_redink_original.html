<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>原版 RedInk 前端界面（基线）</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --sub: #64748b;
      --accent: #2563eb;
      --line: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #f0f9ff 0%, var(--bg) 35%);
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .wrap {
      max-width: 1080px;
      margin: 24px auto;
      padding: 0 16px 32px;
    }
    .title {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .desc {
      margin: 0 0 20px;
      color: var(--sub);
      line-height: 1.6;
    }
    .layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 16px;
    }
    .sidebar, .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(2, 6, 23, 0.05);
    }
    .sidebar {
      padding: 16px;
      min-height: 560px;
    }
    .logo {
      padding: 10px 12px;
      border: 1px dashed #93c5fd;
      border-radius: 10px;
      color: #1d4ed8;
      font-weight: 700;
      text-align: center;
      background: #eff6ff;
      margin-bottom: 14px;
    }
    .nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }
    .item.active {
      border-color: #93c5fd;
      color: #1d4ed8;
      background: #eff6ff;
      font-weight: 600;
    }
    .main {
      padding: 18px;
      display: grid;
      gap: 14px;
    }
    .hero {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      background: linear-gradient(145deg, #ffffff 0%, #f8fbff 100%);
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1e40af;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .hero h2 {
      margin: 0 0 6px;
      font-size: 22px;
    }
    .hero p {
      margin: 0;
      color: var(--sub);
      line-height: 1.7;
    }
    .result {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      background: #fff;
    }
    .btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0 12px;
    }
    .btn {
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 8px 12px;
      font-size: 13px;
      background: #fff;
    }
    .btn.primary {
      border-color: #93c5fd;
      color: #1d4ed8;
      background: #eff6ff;
      font-weight: 600;
    }
    .features {
      margin: 0;
      padding-left: 18px;
      color: #334155;
      line-height: 1.8;
    }
    .footer-note {
      margin-top: 14px;
      font-size: 12px;
      color: var(--sub);
    }
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { min-height: auto; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">原版 RedInk 前端界面（基线）</h1>
    <p class="desc">来源：本仓库导入 RedInk 后的基线提交（`4bd5788`）。定位更通用，包含历史记录入口。</p>

    <div class="layout">
      <aside class="sidebar">
        <div class="logo">红墨 / 原版界面</div>
        <div class="nav">
          <div class="item active">创作中心</div>
          <div class="item">历史记录</div>
          <div class="item">系统设置</div>
        </div>
      </aside>

      <main class="panel main">
        <section class="hero">
          <span class="badge">AI 驱动的红墨创作助手</span>
          <h2>灵感一触即发</h2>
          <p>输入你的创意主题，让 AI 帮你生成爆款标题、正文和封面图。</p>
        </section>

        <section class="result">
          <div class="btns">
            <button class="btn">再来一篇</button>
            <button class="btn primary">一键下载</button>
          </div>
          <ul class="features">
            <li>导航包含“历史记录”入口。</li>
            <li>首页与全局页脚含 redink.top 官方站点引导信息。</li>
            <li>结果页主要是下载与重绘，没有直接发布按钮。</li>
            <li>更偏通用创作工具形态，非“发布优先”链路。</li>
          </ul>
        </section>
      </main>
    </div>

    <p class="footer-note">文件生成时间：2026-03-08</p>
  </div>
</body>
</html>
