<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeX 图文编辑器</title>
    <style>
      :root {
        --bg: #f7f5ef;
        --panel: #ffffff;
        --line: #d6d0c2;
        --text: #2c2c2c;
        --accent: #df6f2d;
        --accent-dark: #b8561f;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 10%, #fff9e8 0%, var(--bg) 55%);
      }
      .wrap {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .title {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }
      .badge {
        background: #ffe6d6;
        color: #7c3b16;
        border: 1px solid #f1c9ad;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        min-height: 72vh;
      }
      .panel h2 {
        margin: 0 0 10px 0;
        font-size: 16px;
      }
      textarea {
        width: 100%;
        min-height: calc(72vh - 110px);
        border: 1px solid #c8c1b2;
        border-radius: 10px;
        padding: 12px;
        font-size: 13px;
        font-family: "JetBrains Mono", "Consolas", monospace;
        resize: vertical;
        background: #fffefa;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      button {
        border: 1px solid var(--accent);
        border-radius: 10px;
        padding: 8px 14px;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
      }
      button.secondary {
        background: #fff;
        color: var(--accent-dark);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .meta {
        font-size: 12px;
        color: #666;
        margin-bottom: 10px;
      }
      .preview-box {
        min-height: calc(72vh - 140px);
        border: 1px dashed #c8c1b2;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9f7f1;
        overflow: auto;
      }
      .preview-box img {
        max-width: 100%;
        display: block;
      }
      .hint {
        color: #7d796b;
        text-align: center;
        padding: 16px;
      }
      .status {
        margin-top: 8px;
        font-size: 13px;
      }
      .status.error {
        color: #b3261e;
      }
      .status.ok {
        color: #1f7a40;
      }
      .progress {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }
      .step {
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid #d3ccbd;
        font-size: 12px;
      }
      .step.done {
        background: #e8f8ee;
        border-color: #9cd6b0;
      }
      .step.current {
        background: #fff1e7;
        border-color: #f1bc95;
      }
      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .panel {
          min-height: auto;
        }
        textarea {
          min-height: 42vh;
        }
        .preview-box {
          min-height: 42vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      async function api(url, options = {}) {
        const response = await fetch(url, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "请求失败");
        }
        return data;
      }

      function App() {
        const params = useMemo(() => new URLSearchParams(window.location.search), []);
        const sessionId = params.get("session_id") || "";

        const [session, setSession] = useState(null);
        const [code, setCode] = useState("");
        const [currentPageId, setCurrentPageId] = useState("");
        const [previewImage, setPreviewImage] = useState("");
        const [busy, setBusy] = useState(false);
        const [status, setStatus] = useState("");
        const [isError, setIsError] = useState(false);

        const loadSession = async () => {
          if (!sessionId) return;
          try {
            setBusy(true);
            const data = await api(`/api/editor/session/${sessionId}`);
            setSession(data.session);
            setCurrentPageId(data.session.current_page.id);
            setCode(data.session.current_page.code || "");
            setPreviewImage("");
            setStatus("");
          } catch (err) {
            setIsError(true);
            setStatus(err.message);
          } finally {
            setBusy(false);
          }
        };

        useEffect(() => {
          loadSession();
        }, []);

        const handlePreview = async () => {
          try {
            setBusy(true);
            setIsError(false);
            const data = await api(`/api/editor/session/${sessionId}/preview`, {
              method: "POST",
              body: JSON.stringify({ page_id: currentPageId, code }),
            });
            if (!data.success) {
              throw new Error(data.error || "预览失败");
            }
            setPreviewImage(`data:image/png;base64,${data.image}`);
            setStatus("预览成功");
          } catch (err) {
            setIsError(true);
            setStatus(err.message);
          } finally {
            setBusy(false);
          }
        };

        const handleSave = async () => {
          try {
            setBusy(true);
            setIsError(false);
            const data = await api(`/api/editor/session/${sessionId}/save`, {
              method: "POST",
              body: JSON.stringify({ page_id: currentPageId, code }),
            });
            if (!data.success) {
              throw new Error(data.error || "保存失败");
            }
            setPreviewImage(`data:image/png;base64,${data.saved_image}`);
            if (data.completed) {
              setStatus(`全部完成，manifest: ${data.manifest_path}`);
              await loadSession();
              return;
            }
            setCurrentPageId(data.next_page.id);
            setCode(data.next_page.code || "");
            setStatus(`已保存，进入下一页：${data.next_page.label}`);
            await loadSession();
          } catch (err) {
            setIsError(true);
            setStatus(err.message);
          } finally {
            setBusy(false);
          }
        };

        if (!sessionId) {
          return (
            <div className="wrap">
              <h1 className="title">缺少 session_id</h1>
              <p>请先调用 /api/editor/session/create 创建会话。</p>
            </div>
          );
        }

        if (!session) {
          return (
            <div className="wrap">
              <h1 className="title">正在加载会话...</h1>
            </div>
          );
        }

        return (
          <div className="wrap">
            <div className="header">
              <h1 className="title">TeX 图文编辑器：{session.title}</h1>
              <div className="badge">
                {session.publish_mode}
                {session.publish_mode === "checklist" ? ` / ${session.body_template}` : ""}
              </div>
            </div>
            <div className="meta">
              会话: {session.session_id} | run_id: {session.run_id} | 输出目录: {session.output_dir}
            </div>
            <div className="progress">
              {session.pages.map((p) => (
                <span
                  key={p.id}
                  className={`step ${p.saved ? "done" : ""} ${p.id === currentPageId ? "current" : ""}`}
                >
                  {p.label}
                </span>
              ))}
            </div>
            <div className="grid">
              <div className="panel">
                <h2>左侧：可编辑 TeX 文本（{currentPageId}）</h2>
                <textarea value={code} onChange={(e) => setCode(e.target.value)} />
                <div className="actions">
                  <button className="secondary" disabled={busy} onClick={handlePreview}>
                    预览
                  </button>
                  <button disabled={busy} onClick={handleSave}>
                    保存并下一页
                  </button>
                </div>
                {status ? (
                  <div className={`status ${isError ? "error" : "ok"}`}>{status}</div>
                ) : null}
              </div>
              <div className="panel">
                <h2>右侧：封面/正文预览</h2>
                <div className="preview-box">
                  {previewImage ? (
                    <img src={previewImage} alt="preview" />
                  ) : (
                    <div className="hint">点击“预览”查看最新渲染结果</div>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("app")).render(<App />);
    </script>
  </body>
</html>
